{% load i18n %}
<p>
    {{ note.eve_name }}
    {% if note.eve_catagory == 'character' %}
        <br />
        <span class="badge text-bg-secondary">{{ note.corporation_name }}</span>
        <br />
        <span class="badge text-bg-secondary">{{ note.alliance_name }}</span>
    {% endif %}
</p>
{% if note.blacklisted %}
    <span class="badge text-bg-danger">{% translate "BLACKLISTED" %}</span>
{% endif %}
{% if note.restricted %}
    <span class="badge text-bg-danger">{% translate "RESTRICTED" %}</span>
{% endif %}
